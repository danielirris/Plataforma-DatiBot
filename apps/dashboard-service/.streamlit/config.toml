[server]
port = 8501
headless = true
# Permite embeber el dashboard en el iframe del shell (otro origen: :3000).
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#10b981"
backgroundColor = "#06090b"
secondaryBackgroundColor = "#0f171a"
textColor = "#eaf1ed"
font = "sans serif"

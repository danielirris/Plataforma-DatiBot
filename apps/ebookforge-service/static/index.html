<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><title>Datibot · Ebooks</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bg:#06090b; --panel:#0f171a; --text:#eaf1ed; --muted:#93a39b;
    --accent:#10b981; --accent-2:#2dd4bf; --hairline:rgba(255,255,255,.10); --field:rgba(255,255,255,.05);
  }
  *{box-sizing:border-box}
  body{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
       margin:0;min-height:100vh;color:var(--text);
       background:
         radial-gradient(760px 420px at 108% -10%,rgba(16,185,129,.18),transparent 60%),
         radial-gradient(680px 380px at -12% 112%,rgba(45,212,191,.13),transparent 60%),
         var(--bg);}
  .wrap{max-width:820px;margin:0 auto;padding:48px 20px 64px}
  .badge{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--hairline);
         background:var(--field);border-radius:999px;padding:5px 12px;font-size:12px;color:var(--muted)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--accent-2);box-shadow:0 0 8px var(--accent-2)}
  h1{font-size:40px;font-weight:800;letter-spacing:-.02em;margin:16px 0 6px;
     background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;
     background-clip:text;color:transparent}
  .sub{color:var(--muted);margin:0 0 28px;font-size:15px}
  .card{border:1px solid var(--hairline);background:color-mix(in srgb,var(--panel) 70%,transparent);
        backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:20px;padding:22px}
  label{display:block;font-weight:600;font-size:13px;margin:16px 0 6px;color:var(--text)}
  label:first-child{margin-top:0}
  textarea,select,input[type=file]{width:100%;color:var(--text);background:var(--field);
       border:1px solid var(--hairline);border-radius:12px;padding:11px 13px;font-size:14px;outline:none}
  textarea{min-height:300px;font-family:ui-monospace,"SF Mono",monospace;font-size:13px;line-height:1.55;resize:vertical}
  textarea::placeholder{color:var(--muted)}
  textarea:focus,select:focus,input:focus{border-color:var(--accent)}
  select,input[type=file]{padding:9px 12px}
  .row{display:flex;gap:18px;flex-wrap:wrap}
  .row>div{flex:1;min-width:200px}
  button{margin-top:22px;background:linear-gradient(90deg,var(--accent),var(--accent-2));color:#04110c;
         border:0;border-radius:12px;padding:13px 26px;font-size:15px;font-weight:700;cursor:pointer;
         transition:filter .15s,transform .1s}
  button:hover{filter:brightness(1.08)}
  button:active{transform:scale(.98)}
  button:disabled{opacity:.6;cursor:default}
  .status{margin-top:14px;font-size:14px;color:var(--muted);min-height:20px}
  .foot{margin-top:20px;font-size:12px;color:var(--muted)}
  code{background:var(--field);border:1px solid var(--hairline);border-radius:5px;padding:1px 5px;font-size:12px}
</style></head><body>
  <div class="wrap">
    <span class="badge"><span class="dot"></span> Datibot · Ebooks</span>
    <h1>Generador de ebooks</h1>
    <p class="sub">Pega el contenido (JSON de bloques), elige un tema y descarga el PDF. El motor maqueta todo por ti.</p>

    <div class="card">
      <label>Contenido (JSON de bloques)</label>
      <textarea id="content" placeholder="Pega aquí tu content.json…"></textarea>

      <div class="row">
        <div>
          <label>Tema de diseño</label>
          <select id="theme"></select>
        </div>
        <div>
          <label>Imágenes (opcional)</label>
          <input id="images" type="file" multiple accept="image/*">
        </div>
      </div>

      <button id="btn" onclick="generar()">📕 Generar PDF</button>
      <div class="status" id="status"></div>
      <p class="foot">Los nombres de las imágenes deben coincidir con los <code>src</code> del JSON.</p>
    </div>
  </div>
<script>
const $ = (id)=>document.getElementById(id);
fetch('/themes').then(r=>r.json()).then(d=>{
  $('theme').innerHTML = d.themes.map(t=>`<option>${t}</option>`).join('');
}).catch(()=>{ $('status').textContent = '⚠️ No se pudieron cargar los temas.'; });

async function generar(){
  const btn = $('btn'), status = $('status');
  const content = $('content').value.trim();
  if(!content){ status.textContent = '⚠️ Pega primero el contenido (JSON).'; return; }
  btn.disabled = true; const label = btn.textContent; btn.textContent = 'Generando…';
  status.textContent = 'Maquetando el PDF…';
  try{
    const fd = new FormData();
    fd.append('content', content);
    fd.append('theme', $('theme').value);
    for(const f of $('images').files) fd.append('images', f);
    const res = await fetch('/generate',{method:'POST',body:fd});
    if(!res.ok){ status.textContent = '⚠️ Error: ' + (await res.text()).slice(0,200); return; }
    const url = URL.createObjectURL(await res.blob());
    const a = document.createElement('a'); a.href=url; a.download='ebook.pdf'; a.click();
    URL.revokeObjectURL(url);
    status.textContent = '✓ PDF generado y descargado.';
  }catch(e){ status.textContent = '⚠️ No se pudo generar: ' + e.message; }
  finally{ btn.disabled = false; btn.textContent = label; }
}
</script></body></html>
